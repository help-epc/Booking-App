.loading {

.notice {

.price-card {

}

.price-review {

.field-grid {

.calendar-key {

.calendar-grid {

.calendar-card {

.calendar-card.available { border-color: #4ade80; }

<body>
<div id="root"><div class="loading"><div>Loading EPC Pro...</div></div></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SUPABASE_URL = 'https://lokyeggbiusgrrxbvnho.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXJhYmFzZSIsInJlZiI6Imxva3llZ2diaXVzZ3JyeGJ2bmhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjA1NzIsImV4cCI6MjA5MjU5NjU3Mn0.c9OAP7QnOYA9sB-0afDnUDnu-9SNXyRqgoggTWUiJhQ';

const AM_CAPACITY = 5;
const PM_CAPACITY = 3;
const DAILY_CAPACITY = 8;

let supabaseClient = null;
let isSupabaseConfigured = false;

if (
  SUPABASE_URL &&
  SUPABASE_ANON_KEY &&
  !SUPABASE_URL.includes('PASTE') &&
  !SUPABASE_ANON_KEY.includes('PASTE') &&
  SUPABASE_URL.startsWith('http')
) {
  try {
    if (typeof supabase !== 'undefined' && supabase.createClient) {
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      isSupabaseConfigured = true;
      console.log('✅ Supabase client initialized');
    }
  } catch (error) {
    console.error('❌ Failed to initialize Supabase:', error);
  }
}

function safeDocuments(row) {
  if (!row || !row.documents) return {};
  if (typeof row.documents === 'object') return row.documents;
  try {
    return JSON.parse(row.documents);
  } catch {
    return {};
  }
}

function toNumber(value) {
  if (value === null || value === undefined || value === '') return null;
  const cleaned = String(value).replace(/[^0-9.]/g, '');
  const number = Number(cleaned);
  return Number.isFinite(number) ? number : null;
}

function firstPresent(...values) {
  for (const value of values) {
    if (value !== null && value !== undefined && value !== '') return value;
  }
  return null;
}

function normaliseText(value) {
  return String(value || '').trim().toLowerCase();
}

function formatCurrency(value) {
  const number = toNumber(value);
  if (number === null) return 'N/A';
  return `£${number.toFixed(2)}`;
}

function formatCurrencyPlain(value) {
  const number = toNumber(value);
  if (number === null) return null;
  return `£${number.toFixed(2)}`;
}

function getJobReference(job) {
  const docs = safeDocuments(job);
  return firstPresent(
    job?.reference,
    docs.public_reference,
    docs.reference,
    docs.job_reference,
    docs.booking_reference,
    job?.id ? String(job.id).substring(0, 8) : null
  ) || 'No reference';
}

function getJobEpcType(job) {
  const docs = safeDocuments(job);
  const raw = firstPresent(
    job?.epc_type,
    docs.service_type,
    docs.epc_type,
    docs.type,
    docs.service
  );

  const text = normaliseText(raw);

  if (text.includes('commercial') || text.includes('non-domestic') || text.includes('non domestic')) {
    return 'Commercial';
  }

  return 'Domestic';
}

function getJobStatus(job) {
  const docs = safeDocuments(job);
  return firstPresent(
    job?.status,
    docs.status,
    docs.job_status,
    'Awaiting booking'
  );
}

function getJobSource(job) {
  const docs = safeDocuments(job);
  return firstPresent(job?.source, docs.source, 'Website');
}

function getJobBookingDate(job) {
  const docs = safeDocuments(job);
  return firstPresent(job?.booking_date, docs.appointment_date, docs.booking_date, '');
}

function getJobBookingWindow(job) {
  const docs = safeDocuments(job);
  return firstPresent(job?.booking_window, docs.appointment_window, docs.booking_window, '');
}

function getSavedQuoteFromJob(job) {
  const docs = safeDocuments(job);
  return firstPresent(
    docs.quote_amount,
    docs.quoted_amount,
    docs.price,
    docs.total_price,
    docs.invoice_amount,
    docs.assessment_fee,
    docs.calculated_quote,
    job?.quote_amount,
    job?.quoted_amount,
    job?.estimated_value,
    job?.invoice_amount
  );
}

function getSavedDepositFromJob(job) {
  const docs = safeDocuments(job);
  return firstPresent(
    docs.deposit_amount,
    docs.deposit_due,
    job?.deposit_amount
  );
}

function getSavedBalanceFromJob(job) {
  const docs = safeDocuments(job);
  return firstPresent(
    docs.balance_due,
    docs.remaining_balance,
    job?.balance_due
  );
}

function getSavedPricingBandFromJob(job) {
  const docs = safeDocuments(job);
  return firstPresent(
    docs.pricing_band,
    docs.price_band,
    docs.band,
    docs.quote_band,
    docs.property_value_band,
    docs.commercial_band,
    docs.floor_area_band,
    job?.pricing_band,
    job?.price_band,
    job?.quote_band
  );
}

function getFallbackContactName(job) {
  const docs = safeDocuments(job);
  return firstPresent(
    docs.customer_name,
    docs.client_name,
    docs.name,
    job?.customer_name,
    job?.client_name,
    'Unknown'
  );
}

function getFallbackContactEmail(job) {
  const docs = safeDocuments(job);
  return firstPresent(
    docs.customer_email,
    docs.client_email,
    docs.email,
    job?.customer_email,
    job?.client_email,
    ''
  );
}

function getFallbackContactPhone(job) {
  const docs = safeDocuments(job);
  return firstPresent(
    docs.customer_phone,
    docs.client_phone,
    docs.phone,
    job?.customer_phone,
    job?.client_phone,
    ''
  );
}

function getSavedQuoteFromLead(lead, relatedJob) {
  const docs = safeDocuments(lead);
  return firstPresent(
    docs.quote_amount,
    docs.quoted_amount,
    docs.price,
    docs.total_price,
    docs.assessment_fee,
    docs.calculated_quote,
    lead?.quote_amount,
    lead?.quoted_amount,
    lead?.estimated_value,
    lead?.invoice_amount,
    relatedJob ? getSavedQuoteFromJob(relatedJob) : null
  );
}

function getSavedPricingBandFromLead(lead, relatedJob) {
  const docs = safeDocuments(lead);
  return firstPresent(
    docs.pricing_band,
    docs.price_band,
    docs.band,
    docs.quote_band,
    docs.property_value_band,
    docs.commercial_band,
    docs.floor_area_band,
    lead?.pricing_band,
    lead?.price_band,
    lead?.quote_band,
    relatedJob ? getSavedPricingBandFromJob(relatedJob) : null
  );
}

function getJobAddress(job, properties) {
  const docs = safeDocuments(job);
  const property = properties.find(p => String(p.id) === String(job?.property_id));

  return firstPresent(
    property?.address,
    job?.property_address,
    docs.property_address,
    docs.address,
    'No address'
  );
}

function getJobPostcode(job, properties) {
  const docs = safeDocuments(job);
  const property = properties.find(p => String(p.id) === String(job?.property_id));

  return firstPresent(
    property?.postcode,
    job?.postcode,
    docs.postcode,
    docs.property_postcode,
    ''
  );
}

function getPropertySquareMeterage(property, job) {
  const docs = safeDocuments(job);

  return firstPresent(
    property?.square_meterage,
    property?.sqm,
    property?.size_m2,
    property?.floor_area,
    job?.square_meterage,
    job?.sqm,
    job?.size_m2,
    job?.floor_area,
    docs.square_meterage,
    docs.sqm,
    docs.floor_area
  );
}

function findRelatedJobForLead(lead, jobs, properties) {
  if (!lead) return null;

  if (lead.job_id) {
    const byJobId = jobs.find(j => String(j.id) === String(lead.job_id));
    if (byJobId) return byJobId;
  }

  if (lead.reference) {
    const byReference = jobs.find(j => normaliseText(getJobReference(j)) === normaliseText(lead.reference));
    if (byReference) return byReference;
  }

  const leadAddress = normaliseText(lead.property_address);
  const leadPostcode = String(lead.postcode || '').replace(/\s/g, '').toLowerCase();

  if (leadAddress || leadPostcode) {
    const matched = jobs.find(job => {
      const jobAddress = normaliseText(getJobAddress(job, properties));
      const jobPostcode = String(getJobPostcode(job, properties) || '').replace(/\s/g, '').toLowerCase();
      const addressMatches = leadAddress && jobAddress && jobAddress === leadAddress;
      const postcodeMatches = leadPostcode && jobPostcode && jobPostcode === leadPostcode;
      return addressMatches && postcodeMatches;
    });

    if (matched) return matched;
  }

  return null;
}

function getLeadDisplayValue(lead, jobs = [], properties = []) {
  const relatedJob = findRelatedJobForLead(lead, jobs, properties);
  const quote = getSavedQuoteFromLead(lead, relatedJob);
  const price = formatCurrencyPlain(quote);
  if (price) return price;

  const band = getSavedPricingBandFromLead(lead, relatedJob);
  if (band) return String(band);

  return 'Review';
}

function getTimeAgo(timestamp) {
  if (!timestamp) return 'Unknown';
  const now = new Date();
  const then = new Date(timestamp);
  if (Number.isNaN(then.getTime())) return 'Unknown';
  const seconds = Math.floor((now - then) / 1000);
  if (seconds < 60) return 'Just now';
  if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
  if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
  if (seconds < 604800) return Math.floor(seconds / 86400) + 'd ago';
  return then.toLocaleDateString('en-GB');
}

function isClosedJob(job) {
  const status = getJobStatus(job);
  return ['EPC served', 'Closed', 'Cancelled', 'Lost'].includes(status);
}

function isActiveJob(job) {
  return !isClosedJob(job);
}

function isCommercialJob(job) {
  return getJobEpcType(job) === 'Commercial';
}

const db = {
  async testConnection() {
    if (!supabaseClient) return { success: false, message: 'Not configured' };
    try {
      const { error } = await supabaseClient.from('contacts').select('count').limit(1);
      if (error) throw error;
      return { success: true, message: 'Connected' };
    } catch (err) {
      return { success: false, message: err.message };
    }
  },

  async getContacts() {
    if (!supabaseClient) return [];
    try {
      const { data, error } = await supabaseClient
        .from('contacts')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) throw error;
      return data || [];
    } catch (err) {
      console.error('❌ Error loading contacts:', err.message);
      return [];
    }
  },

  async getProperties() {
    if (!supabaseClient) return [];
    try {
      const { data, error } = await supabaseClient
        .from('properties')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) throw error;
      return data || [];
    } catch (err) {
      console.error('❌ Error loading properties:', err.message);
      return [];
    }
  },

  async getLeads() {
    if (!supabaseClient) return [];
    try {
      const { data, error } = await supabaseClient
        .from('leads')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) throw error;
      return data || [];
    } catch (err) {
      console.error('❌ Error loading leads:', err.message);
      return [];
    }
  },

  async getJobs() {
    if (!supabaseClient) return [];
    try {
      const { data, error } = await supabaseClient
        .from('jobs')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) throw error;
      return data || [];
    } catch (err) {
      console.error('❌ Error loading jobs:', err.message);
      return [];
    }
  },

  async updateJob(id, updates) {
    if (!supabaseClient) return null;
    try {
      const { data, error } = await supabaseClient
        .from('jobs')
        .update(updates)
        .eq('id', id)
        .select()
        .single();

      if (error) throw error;
      return data;
    } catch (err) {
      console.error('❌ Error updating job:', err.message);
      return null;
    }
  },

  async getEmails() {
    if (!supabaseClient) return [];
    try {
      const { data, error } = await supabaseClient
        .from('emails')
        .select('*')
        .order('received_at', { ascending: false })
        .limit(10);

      if (error) throw error;
      return data || [];
    } catch (err) {
      console.error('❌ Error loading emails:', err.message);
      return [];
    }
  },

  async getMessages() {
    if (!supabaseClient) return [];
    try {
      const { data, error } = await supabaseClient
        .from('messages')
        .select('*')
        .order('received_at', { ascending: false });

      if (error) throw error;
      return data || [];
    } catch (err) {
      console.error('❌ Error loading messages:', err.message);
      return [];
    }
  }
};

function EPCProApp() {
  const [currentPage, setCurrentPage] = useState('dashboard');
  const [contacts, setContacts] = useState([]);
  const [properties, setProperties] = useState([]);
  const [leads, setLeads] = useState([]);
  const [jobs, setJobs] = useState([]);
  const [emails, setEmails] = useState([]);
  const [messages, setMessages] = useState([]);
  const [selectedEmail, setSelectedEmail] = useState(null);
  const [selectedContact, setSelectedContact] = useState(null);
  const [loading, setLoading] = useState(true);
  const [dbStatus, setDbStatus] = useState('disconnected');

  useEffect(() => {
    loadData();
  }, []);

  async function loadData() {
    try {
      setLoading(true);

      if (!isSupabaseConfigured) throw new Error('Supabase not configured');

      const testResult = await db.testConnection();
      if (!testResult.success) throw new Error(testResult.message);

      setDbStatus('connected');

      const [
        contactsData,
        propertiesData,
        leadsData,
        jobsData,
        emailsData,
        messagesData
      ] = await Promise.all([
        db.getContacts(),
        db.getProperties(),
        db.getLeads(),
        db.getJobs(),
        db.getEmails(),
        db.getMessages()
      ]);

      if (
        contactsData.length === 0 &&
        propertiesData.length === 0 &&
        leadsData.length === 0 &&
        jobsData.length === 0
      ) {
        setContacts(sampleData.contacts);
        setProperties(sampleData.properties);
        setLeads(sampleData.leads);
        setJobs(sampleData.jobs);
        setEmails([]);
        setMessages([]);
      } else {
        setContacts(contactsData);
        setProperties(propertiesData);
        setLeads(leadsData);
        setJobs(jobsData);
        setEmails(emailsData);
        setMessages(messagesData);
      }
    } catch (err) {
      console.error('❌ Failed to connect to Supabase:', err.message);
      setDbStatus('disconnected');
      setContacts(sampleData.contacts);
      setProperties(sampleData.properties);
      setLeads(sampleData.leads);
      setJobs(sampleData.jobs);
      setEmails([]);
      setMessages([]);
    } finally {
      setLoading(false);
    }
  }

  async function updateJobInDB(jobId, updates) {
    try {
      if (supabaseClient && dbStatus === 'connected') {
        await db.updateJob(jobId, updates);
      }

      setJobs(prevJobs =>
        prevJobs.map(j => (j.id === jobId ? { ...j, ...updates } : j))
      );
    } catch (err) {
      console.error('❌ Error updating job:', err);
      setJobs(prevJobs =>
        prevJobs.map(j => (j.id === jobId ? { ...j, ...updates } : j))
      );
    }
  }

  if (loading) {
    return (
      <div className="loading">
        <div>Loading EPC Pro Platform...</div>
        <div style={{ fontSize: '14px', color: '#888' }}>Connecting to database...</div>
      </div>
    );
  }

  const renderPage = () => {
    switch (currentPage) {
      case 'dashboard':
        return (
          <Dashboard
            jobs={jobs}
            leads={leads}
            contacts={contacts}
            properties={properties}
            emails={emails}
            selectedEmail={selectedEmail}
            setSelectedEmail={setSelectedEmail}
            updateJobInDB={updateJobInDB}
          />
        );

      case 'calendar':
        return <CalendarPage jobs={jobs} contacts={contacts} properties={properties} />;

      case 'messages':
        return (
          <MessagesPage
            messages={messages}
            contacts={contacts}
            selectedContact={selectedContact}
            setSelectedContact={setSelectedContact}
          />
        );

      case 'contacts':
        return <ContactsPage contacts={contacts} />;

      case 'leads':
        return <LeadsPage leads={leads} jobs={jobs} properties={properties} />;

      case 'jobs':
        return (
          <JobsPage
            jobs={jobs}
            contacts={contacts}
            properties={properties}
            updateJobInDB={updateJobInDB}
          />
        );

      default:
        return (
          <Dashboard
            jobs={jobs}
            leads={leads}
            contacts={contacts}
            properties={properties}
            emails={emails}
            selectedEmail={selectedEmail}
            setSelectedEmail={setSelectedEmail}
            updateJobInDB={updateJobInDB}
          />
        );
    }
  };

  return (
    <div className="app-container">
      <Sidebar currentPage={currentPage} setCurrentPage={setCurrentPage} dbStatus={dbStatus} />
      <main className="main-content">
        <ConnectionBanner status={dbStatus} jobsCount={jobs.length} />
        {renderPage()}
      </main>
    </div>
  );
}

function Dashboard({

    return !job.deposit_paid ? sum + (toNumber(getSavedDepositFromJob(job)) || 0) : sum;
  }, 0);

  const depositsPaid = jobs.reduce((sum, job) => {
    return job.deposit_paid ? sum + (toNumber(getSavedDepositFromJob(job)) || 0) : sum;
  }, 0);

  const activeJobsCount = jobs.filter(j => isActiveJob(j)).length;

  const upcomingJobs = jobs
    .filter(j => getJobBookingDate(j) >= today && isActiveJob(j))
    .sort((a, b) => {
      return String(getJobBookingDate(a)).localeCompare(String(getJobBookingDate(b))) ||
        String(getJobBookingWindow(a)).localeCompare(String(getJobBookingWindow(b)));

  const nextJob = upcomingJobs[0];
  const todaysJobs = jobs.filter(j => getJobBookingDate(j) === today);

  return (
    <div>

          <MetricCard className="deposits-paid" label="Deposits Paid" value={formatCurrency(depositsPaid)} />

          contacts={contacts}
          properties={properties}

      <div className="content-row">
        <div className="section">
          <div className="section-header">
            <h2 className="section-title">
              Today's Schedule - {new Date().toLocaleDateString('en-GB', {
                weekday: 'long',
                month: 'long',
                day: 'numeric'
              })}
            </h2>
          </div>

          {todaysJobs.length === 0 ? (
            <p style={{ color: 'var(--text-secondary)' }}>No jobs scheduled for today</p>
          ) : (
            todaysJobs.map(job => (
              <JobListCard

        <div className="whatsapp-box">

function getDisplayContactName(job, contacts) {
  const contact = contacts.find(c => String(c.id) === String(job?.contact_id));
  return contact?.name || getFallbackContactName(job);
}

function getDisplayContactEmail(job, contacts) {
  const contact = contacts.find(c => String(c.id) === String(job?.contact_id));
  return contact?.email || getFallbackContactEmail(job);
}

function getDisplayContactPhone(job, contacts) {
  const contact = contacts.find(c => String(c.id) === String(job?.contact_id));
  return contact?.phone || getFallbackContactPhone(job);
}

function FieldStatusWidget({ jobs, contacts, properties, updateJobInDB }) {
  const [currentStatus, setCurrentStatus] = useState(null);
  const [saving, setSaving] = useState(false);

  const today = new Date().toISOString().split('T')[0];

  const nextJob = jobs
    .filter(j => getJobBookingDate(j) === today && isActiveJob(j))
    .sort((a, b) => {
      if (getJobBookingWindow(a) !== getJobBookingWindow(b)) {
        return getJobBookingWindow(a) === 'AM' ? -1 : 1;
      }

      return String(a.provisional_eta || '').localeCompare(String(b.provisional_eta || ''));
    })[0];

  const statusButtons = [
    { id: 'on_my_way', label: 'On My Way', emoji: '🚗', color: '#50CDE8' },
    { id: 'arrived', label: 'Arrived', emoji: '📍', color: '#25D366' },
    { id: 'started', label: 'Started', emoji: '▶️', color: '#ffa500' },
    { id: 'completed', label: 'Completed', emoji: '✅', color: '#25D366' },
    { id: 'left_site', label: 'Left Site', emoji: '👋', color: '#264C6B' }
  ];

  async function updateStatus(status) {
    if (!nextJob) return;

    setSaving(true);
    setCurrentStatus(status);

    await updateJobInDB(nextJob.id, {
      field_status: status
    });

    setSaving(false);
  }

  return (
    <div
      style={{
        background: 'var(--card-bg)',
        border: '1px solid var(--card-border)',
        borderRadius: '12px',
        padding: '20px',
        minHeight: '100%'
      }}
    >
      <div
        style={{
          fontSize: '13px',
          fontWeight: '600',
          color: 'var(--epc-yellow)',
          textTransform: 'uppercase',
          marginBottom: '16px',
          display: 'flex',
          alignItems: 'center',
          gap: '8px',
          letterSpacing: '0.5px'
        }}
      >
        🚦 Field Status
      </div>

      {nextJob ? (
        <>
          <div
            style={{
              background: 'var(--bg-darker)',
              borderRadius: '8px',
              padding: '12px',
              marginBottom: '16px',
              color: 'var(--text-primary)'
            }}
          >
            <div style={{ fontWeight: '600', marginBottom: '4px', fontSize: '14px' }}>
              {getJobReference(nextJob)}
            </div>
            <div style={{ fontSize: '14px' }}>{getDisplayContactName(nextJob, contacts)}</div>
            <div style={{ fontSize: '13px', color: 'var(--text-secondary)' }}>
              {getJobAddress(nextJob, properties)}
            </div>
          </div>

          <div className="field-grid">
            {statusButtons.map(btn => (
              <button
                key={btn.id}
                onClick={() => updateStatus(btn.id)}
                disabled={saving}
                style={{
                  background: (currentStatus || nextJob.field_status) === btn.id
                    ? btn.color
                    : 'var(--bg-darker)',
                  color: 'white',
                  border: '1px solid var(--card-border)',
                  borderRadius: '8px',
                  padding: '10px',
                  fontSize: '12px',
                  fontWeight: '600',
                  cursor: saving ? 'wait' : 'pointer',
                  transition: 'all 0.2s'
                }}
              >
                {btn.emoji} {btn.label}
              </button>
            ))}
          </div>

          {(currentStatus || nextJob.field_status) && (
            <div
              style={{
                marginTop: '12px',
                padding: '8px 12px',
                background: 'rgba(37,211,102,0.2)',
                border: '1px solid var(--success)',
                borderRadius: '6px',
                fontSize: '13px',
                color: 'var(--success)',
                textAlign: 'center'
              }}
            >
              ✅ Saved status: {String(currentStatus || nextJob.field_status).replaceAll('_', ' ')}
            </div>
          )}
        </>
      ) : (
        <div
          style={{
            padding: '20px',
            textAlign: 'center',
            color: 'var(--text-secondary)',
            fontSize: '14px'
          }}
        >
          No jobs scheduled for today
        </div>
      )}
    </div>
  );
}

function CalendarPage({ jobs, contacts, properties }) {
  const [selectedDate, setSelectedDate] = useState(null);

  const days = [];
  const today = new Date();

  for (let i = 0; i < 30; i++) {
    const date = new Date(today);
    date.setDate(today.getDate() + i);

    const dateStr = date.toISOString().split('T')[0];
    const dayJobs = jobs.filter(j => getJobBookingDate(j) === dateStr && isActiveJob(j));

    const amCount = dayJobs.filter(j => String(getJobBookingWindow(j) || '').toUpperCase() === 'AM').length;
    const pmCount = dayJobs.filter(j => String(getJobBookingWindow(j) || '').toUpperCase() === 'PM').length;
    const totalCount = amCount + pmCount;

    days.push({
      date: dateStr,
      dayNumber: date.getDate(),
      dayName: date.toLocaleDateString('en-GB', { weekday: 'short' }),
      monthName: date.toLocaleDateString('en-GB', { month: 'short' }),
      amBooked: amCount,
      pmBooked: pmCount,
      totalBooked: totalCount,
      amSlots: Math.max(0, AM_CAPACITY - amCount),
      pmSlots: Math.max(0, PM_CAPACITY - pmCount),
      totalSlots: Math.max(0, DAILY_CAPACITY - totalCount),
      amAvailable: amCount < AM_CAPACITY,
      pmAvailable: pmCount < PM_CAPACITY,
      dayAvailable: totalCount < DAILY_CAPACITY
    });
  }

  return (
    <div>
      <div className="page-header">
        <h1 className="page-title">📅 Calendar</h1>
        <p className="page-subtitle">Booking availability - AM/PM windows only</p>
      </div>

      <div className="section">
        <div className="section-header">
          <h2 className="section-title">Booking Windows</h2>
        </div>

        <div className="notice">
          Dashboard calendar matches the booking app: 5 AM jobs, 3 PM jobs, 8 jobs maximum per day.
        </div>

        <div className="calendar-key">
          <div>
            <span className="badge badge-yellow">AM</span>
            <span style={{ marginLeft: '8px', color: '#e0e0e0' }}>
              08:00 - 13:00 · Max {AM_CAPACITY} jobs
            </span>
          </div>
          <div>
            <span className="badge badge-orange">PM</span>
            <span style={{ marginLeft: '8px', color: '#e0e0e0' }}>
              13:00 - 17:00 · Max {PM_CAPACITY} jobs
            </span>
          </div>
          <div>
            <span className="badge badge-green">DAY</span>
            <span style={{ marginLeft: '8px', color: '#e0e0e0' }}>
              Max {DAILY_CAPACITY} jobs total
            </span>
          </div>
        </div>

        <div className="calendar-grid">
          {days.map(day => (
            <div
              key={day.date}
              onClick={() => setSelectedDate(day.date)}
              className={`calendar-card ${day.dayAvailable ? 'available' : 'full'} ${selectedDate === day.date ? 'selected' : ''}`}
            >
              <div style={{
                fontSize: '10px',
                color: selectedDate === day.date ? '#0f1419' : '#888',
                marginBottom: '4px'
              }}>
                {day.dayName}
              </div>

              <div style={{
                fontSize: '20px',
                fontWeight: '600',
                color: selectedDate === day.date ? '#0f1419' : '#fff',
                marginBottom: '4px'
              }}>
                {day.dayNumber}
              </div>

              <div style={{
                fontSize: '10px',
                color: selectedDate === day.date ? '#0f1419' : '#888',
                marginBottom: '8px'
              }}>
                {day.monthName}
              </div>

              <div style={{ fontSize: '11px' }}>
                <div style={{
                  color: day.amAvailable ? '#4ade80' : '#ff6b6b',
                  marginBottom: '2px'
                }}>
                  AM: {day.amSlots} left / {AM_CAPACITY}
                </div>
                <div style={{
                  color: day.pmAvailable ? '#4ade80' : '#ff6b6b',
                  marginBottom: '2px'
                }}>
                  PM: {day.pmSlots} left / {PM_CAPACITY}
                </div>
                <div style={{
                  color: day.dayAvailable ? '#94a3b8' : '#ff6b6b'
                }}>
                  Day: {day.totalSlots} left / {DAILY_CAPACITY}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {selectedDate && (
        <div className="section">
          <div className="section-header">
            <h2 className="section-title">Bookings for {selectedDate}</h2>
          </div>

          {jobs.filter(j => getJobBookingDate(j) === selectedDate).length > 0 ? (
            jobs
              .filter(j => getJobBookingDate(j) === selectedDate)
              .sort((a, b) => {
                const wa = String(getJobBookingWindow(a) || '');
                const wb = String(getJobBookingWindow(b) || '');
                if (wa !== wb) return wa === 'AM' ? -1 : 1;
                return String(a.provisional_eta || '').localeCompare(String(b.provisional_eta || ''));
              })
              .map(job => (
                <JobListCard
                  key={job.id}
                  job={job}
                  contacts={contacts}
                  properties={properties}
                />
              ))
          ) : (
            <p style={{ color: '#888' }}>No bookings for this date</p>
          )}
        </div>
      )}
    </div>
  );
}

      messagesByContact[msg.contact_id].push(msg);

}

function EmailWidget({ emails, contacts, setSelectedEmail }) {
  return (
    <div className="section">
      <div className="section-header">
        <h2 className="section-title">
          <Icon name="mail" size={20} /> Recent Emails
        </h2>
        <ComingSoonButton>✉️ Compose</ComingSoonButton>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
        {(!emails || emails.length === 0) ? (
          <p style={{ color: '#888', padding: '20px', textAlign: 'center' }}>
            No emails yet. Connect Gmail API to start receiving emails.
          </p>
        ) : (
          emails.map(email => {
            const contact = contacts.find(c => c.email === email.from_email);

            return (
              <div
                key={email.id}
                onClick={() => setSelectedEmail(email)}
                className="job-item"
                style={{
                  cursor: 'pointer',
                  borderLeft: email.is_read
                    ? '3px solid #2a3a52'
                    : '3px solid #ffa500'
                }}
              >
                <div style={{
                  display: 'flex',
                  justifyContent: 'space-between',
                  alignItems: 'start',
                  marginBottom: '6px'
                }}>
                  <div style={{
                    fontWeight: email.is_read ? '400' : '700',
                    color: '#fff',
                    fontSize: '14px'
                  }}>
                    {contact?.name || email.from_email}
                  </div>

                  <div style={{ color: '#888', fontSize: '12px' }}>
                    {getTimeAgo(email.received_at)}
                  </div>
                </div>

                <div style={{
                  fontWeight: email.is_read ? '400' : '600',
                  color: '#e0e0e0',
                  fontSize: '13px',
                  marginBottom: '4px'
                }}>
                  {email.subject}
                </div>

                <div style={{
                  color: '#888',
                  fontSize: '12px',
                  overflow: 'hidden',
                  textOverflow: 'ellipsis',
                  whiteSpace: 'nowrap'
                }}>
                  {String(email.body || '').substring(0, 80)}...
                </div>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

function EmailViewerModal({ email, contacts, onClose }) {
  const contact = contacts.find(c => c.email === email.from_email);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: '900px' }}>
        <div className="modal-header">
          <div>
            <h2 className="modal-title">{email.subject || 'Email'}</h2>
          </div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>

        <div className="modal-body">
          <div style={{
            marginBottom: '24px',
            paddingBottom: '16px',
            borderBottom: '1px solid #2a3a52'
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
              <div>
                <div style={{ fontWeight: '600', color: '#fff', marginBottom: '4px' }}>
                  {contact?.name || email.from_email}
                </div>
                <div style={{ color: '#888', fontSize: '13px' }}>
                  From: {email.from_email}
                </div>
                <div style={{ color: '#888', fontSize: '13px' }}>
                  To: {email.to_email}
                </div>
              </div>

              <div style={{ textAlign: 'right', color: '#888', fontSize: '13px' }}>
                {email.received_at ? new Date(email.received_at).toLocaleString('en-GB') : '-'}
              </div>
            </div>
          </div>

          <div style={{ marginBottom: '24px', lineHeight: 1.6, color: '#e0e0e0' }}>
            {email.body}
          </div>

          <div style={{ display: 'flex', gap: '12px' }}>
            <ComingSoonButton>↩️ Reply</ComingSoonButton>
            <ComingSoonButton>➡️ Forward</ComingSoonButton>
            <ComingSoonButton>🗑️ Delete</ComingSoonButton>
          </div>
        </div>
      </div>
    </div>
  );
}

function initApp() {
  const root = document.getElementById('root');

  if (root && typeof ReactDOM !== 'undefined') {
    ReactDOM.render(<EPCProApp />, root);
  } else if (root) {
    root.innerHTML = '<div class="loading">Error: React failed to load. Please refresh.</div>';
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}
</script>
</body>
</html>
